name: Build and Publish Docker Image
on:
    workflow_dispatch:

permissions:
    contents: write
    packages: write

jobs:
    publish:
        uses: DCC-BS/ci-workflows/.github/workflows/publish-docker.yml@d56b755ec3877da25146ac5f34a2b4003ff6339d # v8
        secrets: inherit
        with:
            registry: ghcr.io
            image_name: ghcr.io/${{ github.repository }}
            context: .
            dockerfile: ./Dockerfile
            platforms: linux/amd64
            push: true
